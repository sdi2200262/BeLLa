
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeLLa - File View</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <!-- breadcrumb navigation -->
    <div class="breadcrumb">
        <a href="/" class="breadcrumb-link">/Home</a><a href="/upload" class="breadcrumb-link">/Upload</a><a href="#" class="breadcrumb-link">/{{ file.name }}</a>
    </div>

    <div class="file-view-container">
        <!-- File info section -->
        <div class="file-info">
            <div class="file-type-logo">
                {% if file.type == 'image' %}
                    🖼️
                {% else %}
                    📄
                {% endif %}
            </div>
            <h2>{{ file.name }}</h2>
        </div>

        <div class="separator"></div>

        <div class="file-actions">
            <button onclick="viewFile('{{ file.name }}')" class="action-btn view-btn">View File</button>
            <div class="vertical-separator"></div>
            <button onclick="downloadFile('{{ file.name }}')" class="action-btn download-btn">Download File</button>
        </div>
    </div>

    <script>
        function viewFile(fileName) {
            window.open(`/uploads/${fileName}`, '_blank');
        }

        function downloadFile(fileName) {
            window.location.href = `/download/${fileName}`;
        }
    </script>
</body>
</html>
